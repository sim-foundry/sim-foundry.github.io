<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>PENDING</title>
<style>html,body{margin:0}#c{width:512px;height:512px}</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script></head>
<body><div id="c"></div>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { KTX2Loader } from "three/addons/loaders/KTX2Loader.js";
import { MeshoptDecoder } from "three/addons/libs/meshopt_decoder.module.js";
const params = new URLSearchParams(location.search);
const src = params.get("src");
const report = (s) => {
  document.title = s;
  try { fetch("/__verify_done?r=" + encodeURIComponent(s)); } catch (e) {}
};
const fail = (m) => report("FAIL: " + m);
try {
  const el = document.getElementById("c");
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(512, 512);
  el.appendChild(renderer.domElement);
  const scene = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const ktx2 = new KTX2Loader()
    .setTranscoderPath("https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/basis/");
  ktx2.detectSupport(renderer);
  const loader = new GLTFLoader().setMeshoptDecoder(MeshoptDecoder).setKTX2Loader(ktx2);
  loader.load(src, (gltf) => {
    const root = gltf.scene;
    const box = new THREE.Box3().setFromObject(root);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    root.position.sub(center);
    const d = maxDim * 1.8;
    cam.position.set(d, d * 0.7, d); cam.lookAt(0, 0, 0);
    scene.add(root);
    renderer.render(scene, cam);
    // Count meshes + whether any material carries a (KTX2) texture map.
    let meshes = 0, textured = 0;
    root.traverse((o) => { if (o.isMesh) { meshes++; if (o.material && o.material.map) textured++; } });
    report(`OK meshes=${meshes} textured=${textured} dim=${maxDim.toFixed(3)}`);
  }, undefined, (e) => fail(String(e && e.message || e)));
} catch (e) { fail(String(e && e.message || e)); }
</script></body></html>
