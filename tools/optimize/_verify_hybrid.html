<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>PENDING</title>
<style>html,body{margin:0}#c{width:640px;height:480px}</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
}}
</script></head>
<body><div id="c"></div>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { KTX2Loader } from "three/addons/loaders/KTX2Loader.js";
import { MeshoptDecoder } from "three/addons/libs/meshopt_decoder.module.js";
import * as GS from "@mkkellogg/gaussian-splats-3d";
const t0 = performance.now();
const ms = () => Math.round(performance.now() - t0);
const report = (s) => { document.title = s; try { fetch("/__verify_done?r=" + encodeURIComponent(s)); } catch(e){} };
const scenePath = new URLSearchParams(location.search).get("scene");
(async () => {
 try {
  const m = await (await fetch(scenePath, {cache:"no-cache"})).json();
  const sp = m.splat;
  const tSplat0 = performance.now();
  const viewer = new GS.Viewer({
    rootElement: document.getElementById("c"),
    cameraUp: m.world_up || [0,0,1],
    initialCameraPosition: (m.camera&&m.camera.position)||[0,-1,0.6],
    initialCameraLookAt: [0,0,0],
    sharedMemoryForWorkers: false, gpuAcceleratedSort: false,
    sphericalHarmonicsDegree: 1, useBuiltInControls: true, antialiased: false,
    showLoadingUI: false, devicePixelRatio: 1,
  });
  await viewer.addSplatScene(sp.local_url, {
    format: GS.LoaderUtils.sceneFormatFromPath(sp.local_url),
    splatAlphaRemovalThreshold: 20,
    position: sp.position, rotation: sp.quaternion_xyzw, scale: sp.scale, showLoadingUI: false,
  });
  const splatMs = Math.round(performance.now() - tSplat0);
  viewer.start();
  const ktx2 = new KTX2Loader().setTranscoderPath("https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/basis/");
  ktx2.detectSupport(viewer.renderer);
  const loader = new GLTFLoader().setMeshoptDecoder(MeshoptDecoder).setKTX2Loader(ktx2);
  const objs = m.objects || [];
  const tMesh0 = performance.now();
  let done = 0, fails = 0;
  await Promise.all(objs.map((o) => new Promise((res) => {
    loader.load(o.url, (g) => { viewer.threeScene.add(g.scene); done++; res(); },
      undefined, () => { fails++; res(); });
  })));
  const meshMs = Math.round(performance.now() - tMesh0);
  report(`OK total=${ms()}ms splat=${splatMs}ms meshes=${done}/${objs.length}(fail ${fails})=${meshMs}ms`);
 } catch (e) { report("FAIL: " + (e&&e.message||e)); }
})();
</script></body></html>
